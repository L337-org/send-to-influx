name: 'Check inbound changes'
permissions:
  contents: read

# Triggers
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Jobs
jobs:

  pytest-run:
    runs-on: [ubuntu-latest]
    name: Run pytest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest -v --cov=toinflux --cov=sendtoinflux --cov-report=term-missing

  flake8-run:
    # Runs flake8 as an alternative, faster(?) linter

    runs-on: [ubuntu-latest]

    name: Run flake8
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8

  mypy-run:
    # Static type check. Configured permissively (see pyproject.toml) since
    # the codebase is not fully type-hinted yet - this just keeps obvious
    # type errors from creeping in on code that does have hints.

    runs-on: [ubuntu-latest]

    name: Run mypy
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy toinflux sendtoinflux.py

  arm64-verify:
    # packaging/deb/build-deb.sh ships the .deb as Architecture: all (no separate per-arch
    # build) on the assumption that the app and every dependency has a working
    # pure-Python fallback for any optional compiled accelerator (PyYAML's/
    # charset-normalizer's C extensions are stripped post-install for exactly this
    # reason). This job builds and installs that same .deb on a real arm64 runner and
    # smoke-tests it, to catch a future dependency change that makes a compiled
    # extension load-bearing rather than optional. Runs on every push/PR (not gated
    # to main) and is a required status check, so a regression here blocks the merge
    # instead of only being noticed after it's already on main.
    runs-on: [ubuntu-24.04-arm]
    name: Verify .deb build on arm64
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Ensure rsyslog and logrotate are present
        # Recommends:, not Depends: (see build-deb.sh) - typically present on
        # a full Ubuntu runner image already, but installed explicitly rather
        # than assumed, so the packaging scenario tests below (SI-12's
        # rsyslog/logrotate config) can't be silently skipped by a future
        # runner-image change.
        #
        # Retried: the arm64 ports mirror (ports.ubuntu.com) intermittently
        # advertises a security point-release in its Packages index before the
        # matching .deb is actually in the pool, so a single install can 404 on
        # an otherwise-valid version (transient, Ubuntu-side - the amd64/Debian
        # legs of the same build are unaffected). A plain apt-get update doesn't
        # help, since the index itself is the stale half; retrying picks up the
        # pool once it catches up rather than failing the whole run.
        run: |
          for attempt in 1 2 3 4 5; do
            if sudo apt-get update -q && sudo apt-get install -yq rsyslog logrotate; then
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "apt install attempt $attempt failed (likely a transient mirror 404); retrying in 15s..."
              sleep 15
            fi
          done
          echo "rsyslog/logrotate install still failing after 5 attempts" >&2
          exit 1

      - name: Build .deb package
        run: packaging/deb/build-deb.sh

      - name: Generate a random test secret for the Hue credential
        # Generated fresh and masked each run, rather than a fixed string
        # committed to the repo - avoids both a secret-scanning false positive
        # on a debconf `password`-typed field and printing a recognisable
        # constant in job logs (the `run:` script text itself is echoed to the
        # log, and so is the settings.yaml diff a later step reads back).
        run: |
          secret="ci-test-$(openssl rand -hex 16)"
          echo "::add-mask::$secret"
          echo "HUE_TEST_SECRET=$secret" >> "$GITHUB_ENV"

      - name: Run the packaging scenario tests
        # packaging/deb/test-packaging.sh exercises the full install lifecycle
        # against the just-built .deb on this runner's real systemd: upgrade
        # over the latest published release (obsolete-conffile handover, no
        # re-prompts), fresh seeded install (Hue as the representative source -
        # one of each prompt type; InfluxDB identity/secret deliberately left
        # blank, since version detection against a real server is out of scope),
        # plain-upgrade silence over a hand-edited config, restart-on-upgrade
        # of a running service, dpkg-reconfigure semantics (stored credential
        # satisfies a blank secret prompt), per-source question visibility at
        # debconf's default priority, and purge (config, credentials, and
        # debconf answers all removed). Each assertion is behaviour that
        # regressed, or nearly regressed, at least once - see PR #48.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: sudo -E bash packaging/deb/test-packaging.sh send-to-influx_*_all.deb

  bookworm-verify:
    # Same packaging scenario suite as arm64-verify, but inside a debian:12
    # container - systemd 252, the oldest systemd-creds this package supports
    # in practice (Raspberry Pi OS / Debian bookworm). The arm64 runner ships
    # systemd 255+, which silently masks older-systemd behaviour differences:
    # a real 4.1 regression (systemd-creds decrypt refusing un-named
    # credentials, because only >= 254 strips the ".cred" suffix when deriving
    # a name from the filename) passed CI and was only caught in the field on
    # a bookworm Pi. No systemd is *running* in the container, so the
    # restart-on-upgrade scenario self-skips - arm64-verify covers that; this
    # job exists for the systemd-creds *tooling* version coverage.
    runs-on: [ubuntu-latest]
    name: Verify .deb on Debian 12 (systemd 252)
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Generate a random test secret for the Hue credential
        # Same reasoning as arm64-verify's copy of this step.
        run: |
          secret="ci-test-$(openssl rand -hex 16)"
          echo "::add-mask::$secret"
          echo "HUE_TEST_SECRET=$secret" >> "$GITHUB_ENV"

      - name: Build the .deb and run the packaging scenario tests in a debian:12 container
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src:ro" \
            -e HUE_TEST_SECRET \
            -e GITHUB_TOKEN \
            debian:12 bash -ec '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -q >/dev/null
              apt-get install -yq python3 python3-venv python3-pip systemd adduser curl rsyslog logrotate >/dev/null
              systemd-creds --version | head -1
              cp -r /src /build && cd /build
              bash packaging/deb/build-deb.sh /tmp/test.deb >/dev/null
              bash packaging/deb/test-packaging.sh /tmp/test.deb
            '
