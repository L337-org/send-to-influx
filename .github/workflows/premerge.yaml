name: 'Check inbound changes'
permissions:
  contents: read

# Triggers
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Jobs
jobs:

  pytest-run:
    runs-on: [ubuntu-latest]
    name: Run pytest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest -v --cov=toinflux --cov=sendtoinflux --cov-report=term-missing

  flake8-run:
    # Runs flake8 as an alternative, faster(?) linter

    runs-on: [ubuntu-latest]

    name: Run flake8
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8

  mypy-run:
    # Static type check. Configured permissively (see pyproject.toml) since
    # the codebase is not fully type-hinted yet - this just keeps obvious
    # type errors from creeping in on code that does have hints.

    runs-on: [ubuntu-latest]

    name: Run mypy
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy toinflux sendtoinflux.py
