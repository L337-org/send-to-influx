name: 'Check inbound changes'
permissions:
  contents: read

# Triggers
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Jobs
jobs:

  pytest-run:
    runs-on: [ubuntu-latest]
    name: Run pytest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest -v --cov=toinflux --cov=sendtoinflux --cov-report=term-missing

  flake8-run:
    # Runs flake8 as an alternative, faster(?) linter

    runs-on: [ubuntu-latest]

    name: Run flake8
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8

  mypy-run:
    # Static type check. Configured permissively (see pyproject.toml) since
    # the codebase is not fully type-hinted yet - this just keeps obvious
    # type errors from creeping in on code that does have hints.

    runs-on: [ubuntu-latest]

    name: Run mypy
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy toinflux sendtoinflux.py

  arm64-verify:
    # packaging/deb/build-deb.sh ships the .deb as Architecture: all (no separate per-arch
    # build) on the assumption that the app and every dependency has a working
    # pure-Python fallback for any optional compiled accelerator (PyYAML's/
    # charset-normalizer's C extensions are stripped post-install for exactly this
    # reason). This job builds and installs that same .deb on a real arm64 runner and
    # smoke-tests it, to catch a future dependency change that makes a compiled
    # extension load-bearing rather than optional. Runs on every push/PR (not gated
    # to main) and is a required status check, so a regression here blocks the merge
    # instead of only being noticed after it's already on main.
    runs-on: [ubuntu-24.04-arm]
    name: Verify .deb build on arm64
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Build .deb package
        run: packaging/deb/build-deb.sh

      - name: Generate a random test secret for the Hue credential
        # Generated fresh and masked each run, rather than a fixed string
        # committed to the repo - avoids both a secret-scanning false positive
        # on a debconf `password`-typed field and printing a recognisable
        # constant in job logs (the `run:` script text itself is echoed to the
        # log, and so is the settings.yaml diff a later step reads back).
        run: |
          secret="ci-test-$(openssl rand -hex 16)"
          echo "::add-mask::$secret"
          echo "HUE_TEST_SECRET=$secret" >> "$GITHUB_ENV"

      - name: Seed debconf answers for the interactive install flow
        # Exercises config's conditional prompts and postinst's db_get/set_secret/
        # set_field/db_unregister wiring - without this, a plain `dpkg -i` with
        # nothing pre-seeded leaves every question at its blank default, so
        # postinst's debconf-driven code still runs but has nothing to act on
        # (no credential gets migrated, settings.yaml is never touched) - the
        # actual write/migrate/db_unregister paths this test exists to exercise
        # never run in CI at all. Hue is picked as a representative source: it has
        # one of each prompt type (string, password, select). InfluxDB's
        # identity/secret are deliberately left blank - version detection against a
        # real server is out of scope for this smoke test (see README's "leave
        # every question blank" supported flow), so Hue won't get auto-enabled into
        # sources:, but its own credential still gets migrated and unregistered
        # regardless, which is what this step exists to verify.
        run: |
          {
            echo "send-to-influx send-to-influx/sources-to-configure multiselect hue"
            echo "send-to-influx send-to-influx/influx-url string"
            echo "send-to-influx send-to-influx/influx-identity string"
            echo "send-to-influx send-to-influx/influx-secret password"
            echo "send-to-influx send-to-influx/hue-host string ci-test-bridge.example.com"
            echo "send-to-influx send-to-influx/hue-user password ${HUE_TEST_SECRET}"
            echo "send-to-influx send-to-influx/hue-temperature-units select C"
          } | sudo debconf-set-selections

      - name: Install and smoke-test the .deb
        run: |
          sudo DEBIAN_FRONTEND=noninteractive dpkg -i send-to-influx_*.deb
          /opt/send-to-influx/venv/bin/send-to-influx --version
          cp example_settings.yaml /tmp/settings.yaml
          /opt/send-to-influx/venv/bin/send-to-influx --check-config --settings /tmp/settings.yaml

      - name: Verify the debconf-driven install applied the Hue credential and cleaned up after itself
        run: |
          # Parse the actual YAML rather than grepping for a substring that could in
          # principle match some unrelated field - proves hue.host/hue.user
          # specifically got the intended values, not just that the right text
          # appears *somewhere* in the file.
          sudo /opt/send-to-influx/venv/bin/python3 - <<PYEOF
          import yaml

          with open("/etc/send-to-influx/settings.yaml", encoding="utf8") as f:
              settings = yaml.safe_load(f)

          hue = settings["hue"]
          assert hue["host"] == "ci-test-bridge.example.com", hue["host"]
          assert hue["user"].startswith("<stored in systemd-creds"), hue["user"]
          assert "${HUE_TEST_SECRET}" not in hue["user"]
          print("settings.yaml: hue.host/hue.user assertions OK")
          PYEOF
          sudo test -f /etc/send-to-influx/credstore.encrypted/hue-user.cred

          # The plaintext secret must not be sitting anywhere on disk once postinst
          # is done with it: not in settings.yaml (migrated to systemd-creds), and
          # not still in debconf's own passwords.dat (db_unregister must have
          # purged it - see debconf-devel(7)'s "clear a password value out of it as
          # soon as is possible" guidance, and CLAUDE.md's "Credential storage" doc).
          # grep -q exits 1 for "no match" (the outcome we want here) but also 2 for
          # a genuine error (e.g. an unreadable path) - a bare `! grep` would treat
          # both alike, silently passing on an error without having actually
          # checked anything. Assert the exact exit code instead of just negating.
          assert_secret_absent() {
            set +e
            sudo grep -rq "$HUE_TEST_SECRET" "$1"
            local status=$?
            set -e
            if [ "$status" -ne 1 ]; then
              echo "assert_secret_absent: expected grep to find no match (exit 1) in $1, got exit $status" >&2
              exit 1
            fi
          }
          assert_secret_absent /etc/send-to-influx/settings.yaml
          assert_secret_absent /var/cache/debconf/
