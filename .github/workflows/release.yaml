name: 'Release'
run-name: Release ${{ github.ref_name }}
permissions:
  contents: write

# Triggers
on:
  push:
    tags:
      # Match every tag rather than trying to be precise about version-number shape -
      # GitHub's tag-filter glob syntax doesn't clearly document whether `+`/character
      # classes work as quantifiers or literals, so relying on that got this wrong twice.
      # The "Verify tag matches pyproject.toml version" step below is the real gate;
      # this trigger only needs to not silently exclude this project's actual tags
      # (bare MAJOR.MINOR, e.g. 3.0 - no "v" prefix, unlike the previous 'v*' pattern).
      - '*'

jobs:

  build-and-release:
    runs-on: [ubuntu-latest]
    name: Build .deb and create GitHub release
    outputs:
      deb_name: ${{ steps.build.outputs.deb_name }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Run flake8
        run: flake8

      - name: Verify tag matches pyproject.toml version
        run: |
          pkg_version="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$GITHUB_REF_NAME" != "$pkg_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${pkg_version}"
            exit 1
          fi

      - name: Build .deb package
        id: build
        run: |
          packaging/deb/build-deb.sh
          deb_name="$(basename send-to-influx_*.deb)"
          echo "deb_name=${deb_name}" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: send-to-influx-deb
          path: send-to-influx_*.deb

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A release for this tag may already exist - e.g. GitHub's "Draft a new
          # release" UI creates the tag and the release together when you publish,
          # so by the time this runs (triggered by that same tag push) the release
          # is already there.
          #
          # Hardened after the 4.3 release (2026-07-16): GitHub's release-by-tag
          # lookup endpoint (releases/tags/{tag}) served 503s for an extended period
          # while the list endpoint (releases) kept working, and `gh release upload
          # <tag>` (which uses the by-tag lookup) rendered that 503 as "release not
          # found" and failed the run. So this step decides whether the release
          # exists from the LIST endpoint - a pre-check that tells us what *should*
          # succeed - and then does everything by release id, never touching the
          # by-tag endpoint at all. Each network call is retried, since a failure
          # that contradicts the pre-check is by definition transient.
          set -euo pipefail

          retry() {  # retry CMD...: up to 5 attempts, 30s apart
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then return 0; fi
              [ "$attempt" -lt 5 ] && sleep 30
            done
            echo "retry: giving up after 5 attempts: $*" >&2
            return 1
          }

          find_release_id() {
            # "// empty" so a missing release yields an empty string, never "null".
            gh api "repos/$GITHUB_REPOSITORY/releases" \
              --jq "[.[] | select(.tag_name == \"$GITHUB_REF_NAME\")][0].id // empty"
          }

          release_id="$(retry find_release_id || true)"

          if [ -z "$release_id" ]; then
            # No release yet: create it without assets - assets always go up by id
            # below, so a create that half-succeeds can never strand the upload on
            # the by-tag path. Tolerate create failing outright (e.g. the UI created
            # the release in the race window); only the re-check's verdict matters.
            retry gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || true
            release_id="$(retry find_release_id)"
          fi
          if [ -z "$release_id" ]; then
            echo "No release exists for $GITHUB_REF_NAME and creating one failed" >&2
            exit 1
          fi

          upload_asset() {
            local deb="$1" name asset_id
            name="$(basename "$deb")"
            # Replace any same-named asset first (including a partial one left by an
            # interrupted earlier attempt) - what `--clobber` did, done by id.
            asset_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id/assets" \
              --jq "[.[] | select(.name == \"$name\")][0].id // empty")" || asset_id=""
            if [ -n "$asset_id" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
            fi
            gh api --method POST -H "Content-Type: application/vnd.debian.binary-package" \
              "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$release_id/assets?name=$name" \
              --input "$deb" >/dev/null
          }

          for deb in send-to-influx_*.deb; do
            retry upload_asset "$deb"
          done
          echo "Release $GITHUB_REF_NAME (id $release_id) has its .deb asset(s) attached"

  # APT publishing note: the flat APT repo at https://apt.l337.org/ is no longer
  # published from this workflow. It's owned by https://github.com/L337-org/apt,
  # whose hourly aggregator pulls the .deb assets straight from this repo's GitHub
  # Releases - so creating the release above is all this workflow needs to do.
