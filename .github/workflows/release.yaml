name: 'Release'
run-name: Release ${{ github.ref_name }}
permissions:
  contents: write

# Triggers
on:
  push:
    tags:
      # Match every tag rather than trying to be precise about version-number shape -
      # GitHub's tag-filter glob syntax doesn't clearly document whether `+`/character
      # classes work as quantifiers or literals, so relying on that got this wrong twice.
      # The "Verify tag matches pyproject.toml version" step below is the real gate;
      # this trigger only needs to not silently exclude this project's actual tags
      # (bare MAJOR.MINOR, e.g. 3.0 - no "v" prefix, unlike the previous 'v*' pattern).
      - '*'

jobs:

  build-and-release:
    runs-on: [ubuntu-latest]
    name: Build .deb and create GitHub release
    outputs:
      deb_name: ${{ steps.build.outputs.deb_name }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Run flake8
        run: flake8

      - name: Verify tag matches pyproject.toml version
        run: |
          pkg_version="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$GITHUB_REF_NAME" != "$pkg_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${pkg_version}"
            exit 1
          fi

      - name: Build .deb package
        id: build
        run: |
          packaging/build-deb.sh
          deb_name="$(basename send-to-influx_*.deb)"
          echo "deb_name=${deb_name}" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: send-to-influx-deb
          path: send-to-influx_*.deb

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A release for this tag may already exist - e.g. GitHub's "Draft a new
          # release" UI creates the tag and the release together when you publish,
          # so by the time this runs (triggered by that same tag push) the release
          # is already there. Try creating first; if that fails for any reason
          # (already exists, including the race where it's created in the window
          # between a separate check and this create), fall back to uploading the
          # .deb to whatever release now exists for this tag instead of failing.
          if ! gh release create "$GITHUB_REF_NAME" send-to-influx_*.deb --title "$GITHUB_REF_NAME" --generate-notes; then
            gh release upload "$GITHUB_REF_NAME" send-to-influx_*.deb --clobber
          fi

  check_apt_secret:
    # `secrets` isn't a recognized named-value in a job-level `if:` (only within step
    # run/env/with), so whether to run apt-repo has to be computed in a step here and
    # passed to it via a job output instead of referencing secrets.* directly below.
    # Job id uses underscores, not hyphens: a hyphenated id referenced via dot-notation
    # in an expression (needs.some-id.outputs.x) gets parsed as subtraction, not a
    # property path.
    runs-on: [ubuntu-latest]
    name: Check whether the APT signing key is configured
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - name: Check APT_GPG_PRIVATE_KEY secret
        id: check
        run: echo "has_secret=${{ secrets.APT_GPG_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"

  apt-repo:
    # Publishes the .deb to a flat APT repo on the gh-pages branch, served via GitHub Pages.
    # Requires a one-time setup: generate a GPG key, add its private key (base64-encoded,
    # armored) as the APT_GPG_PRIVATE_KEY secret, and publish the public key for users to
    # import - see the README's "Running as a systemd service" / APT repo section. Skipped
    # until that secret exists, so tagging a release doesn't require the APT repo to be set up.
    #
    # gh-pages's ruleset requires signed commits, so this job also imports a *separate*
    # dedicated commit-signing key (CI_COMMIT_SIGNING_KEY secret, its public half added to
    # the maintainer's GitHub account) and signs the publish commit with it - kept apart
    # from the APT package-signing key above since the two have different trust domains
    # (end users trust the APT key; GitHub verifies this one) and different rotation needs.
    needs: [build-and-release, check_apt_secret]
    if: needs.check_apt_secret.outputs.has_secret == 'true'
    runs-on: [ubuntu-latest]
    name: Publish APT repo to GitHub Pages
    env:
      KEEP_LAST_N: 5
      # Repo variables (not hardcoded) so rotating either is a settings change, not a code
      # change - see the check in "Commit and push" below that fails fast if either is unset.
      COMMIT_SIGNING_KEY_FINGERPRINT: ${{ vars.COMMIT_SIGNING_KEY_FINGERPRINT }}
      COMMIT_SIGNING_EMAIL: ${{ vars.COMMIT_SIGNING_EMAIL }}
      # Isolated from the default keyring (used for APT package signing) so the two
      # keys can never collide - otherwise gpg's default-key selection for Release
      # signing becomes ambiguous, and `gpg --export` (used to publish send-to-influx.gpg)
      # would export *both* keys, defeating the point of keeping them separate.
      COMMIT_SIGNING_GNUPGHOME: /tmp/commit-signing-gnupg
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: send-to-influx-deb
          path: new-deb

      - name: Check out gh-pages branch
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Install apt repo tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gnupg

      - name: Import APT package-signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: printf '%s' "$APT_GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import

      - name: Import commit-signing key
        env:
          GNUPGHOME: ${{ env.COMMIT_SIGNING_GNUPGHOME }}
          CI_COMMIT_SIGNING_KEY: ${{ secrets.CI_COMMIT_SIGNING_KEY }}
        run: |
          if [ -z "$CI_COMMIT_SIGNING_KEY" ]; then
            echo "::error::CI_COMMIT_SIGNING_KEY secret is not set - required now that gh-pages's" \
                 "ruleset enforces signed commits (see CLAUDE.md's 'Branch protection' section)." >&2
            exit 1
          fi
          mkdir -m 700 "$GNUPGHOME"
          printf '%s' "$CI_COMMIT_SIGNING_KEY" | base64 -d | gpg --batch --import

      - name: Update repo contents
        working-directory: gh-pages
        run: |
          cp ../new-deb/*.deb .

          # Keep only the most recent N .deb files; full history stays in GitHub Releases.
          ls -t *.deb | tail -n +$((KEEP_LAST_N + 1)) | xargs -r rm --

          dpkg-scanpackages . /dev/null > Packages
          gzip -9c Packages > Packages.gz

          apt-ftparchive release . > Release
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clear-sign -o InRelease Release
          gpg --batch --yes --armor --export > send-to-influx.gpg

      - name: Commit and push
        working-directory: gh-pages
        env:
          # git invokes gpg internally to sign the commit below - point it at the isolated
          # keyring so it can only ever use the commit-signing key, never the APT key.
          GNUPGHOME: ${{ env.COMMIT_SIGNING_GNUPGHOME }}
        run: |
          if [ -z "$COMMIT_SIGNING_EMAIL" ] || [ -z "$COMMIT_SIGNING_KEY_FINGERPRINT" ]; then
            echo "::error::COMMIT_SIGNING_EMAIL and/or COMMIT_SIGNING_KEY_FINGERPRINT repo" \
                 "variable is not set - required now that gh-pages's ruleset enforces signed" \
                 "commits (see CLAUDE.md's 'Branch protection' section)." >&2
            exit 1
          fi
          # GitHub's "verified signature" check (what the gh-pages ruleset's required
          # signed-commits rule actually enforces, not just "a signature is present")
          # requires the commit's email to match a verified email on the account the
          # signing key is registered to - so this has to be the maintainer's real
          # email, not the usual bot noreply address, or the push gets rejected.
          git config user.name "github-actions[bot]"
          git config user.email "$COMMIT_SIGNING_EMAIL"
          git config user.signingkey "$COMMIT_SIGNING_KEY_FINGERPRINT"
          git config commit.gpgsign true
          git add -A
          # Only skip the commit when there's genuinely nothing staged - piping a bare
          # "git commit || ..." would also swallow a real failure (e.g. signing failing),
          # silently leaving the APT repo stale while the job still reports success.
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Publish ${GITHUB_REF_NAME} to APT repo"
          fi
          git push origin gh-pages
