name: 'Release'
run-name: Release ${{ github.ref_name }}
permissions:
  contents: write

# Triggers
on:
  push:
    tags:
      # Match every tag rather than trying to be precise about version-number shape -
      # GitHub's tag-filter glob syntax doesn't clearly document whether `+`/character
      # classes work as quantifiers or literals, so relying on that got this wrong twice.
      # The "Verify tag matches pyproject.toml version" step below is the real gate;
      # this trigger only needs to not silently exclude this project's actual tags
      # (bare MAJOR.MINOR, e.g. 3.0 - no "v" prefix, unlike the previous 'v*' pattern).
      - '*'

jobs:

  build-and-release:
    runs-on: [ubuntu-latest]
    name: Build .deb and create GitHub release
    outputs:
      deb_name: ${{ steps.build.outputs.deb_name }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Run flake8
        run: flake8

      - name: Verify tag matches pyproject.toml version
        run: |
          pkg_version="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$GITHUB_REF_NAME" != "$pkg_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${pkg_version}"
            exit 1
          fi

      - name: Build .deb package
        id: build
        run: |
          packaging/deb/build-deb.sh
          deb_name="$(basename send-to-influx_*.deb)"
          echo "deb_name=${deb_name}" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: send-to-influx-deb
          path: send-to-influx_*.deb

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A release for this tag may already exist - e.g. GitHub's "Draft a new
          # release" UI creates the tag and the release together when you publish,
          # so by the time this runs (triggered by that same tag push) the release
          # is already there. Try creating first; if that fails for any reason
          # (already exists, including the race where it's created in the window
          # between a separate check and this create), fall back to uploading the
          # .deb to whatever release now exists for this tag instead of failing.
          if ! gh release create "$GITHUB_REF_NAME" send-to-influx_*.deb --title "$GITHUB_REF_NAME" --generate-notes; then
            gh release upload "$GITHUB_REF_NAME" send-to-influx_*.deb --clobber
          fi

  # APT publishing note: the flat APT repo at https://apt.l337.org/ is no longer
  # published from this workflow. It's owned by https://github.com/L337-org/apt,
  # whose hourly aggregator pulls the .deb assets straight from this repo's GitHub
  # Releases - so creating the release above is all this workflow needs to do.
