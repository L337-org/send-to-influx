name: 'Release'
run-name: Release ${{ github.ref_name }}
permissions:
  contents: write

# Triggers
on:
  push:
    tags:
      # Match every tag rather than trying to be precise about version-number shape -
      # GitHub's tag-filter glob syntax doesn't clearly document whether `+`/character
      # classes work as quantifiers or literals, so relying on that got this wrong twice.
      # The "Verify tag matches pyproject.toml version" step below is the real gate;
      # this trigger only needs to not silently exclude this project's actual tags
      # (bare MAJOR.MINOR, e.g. 3.0 - no "v" prefix, unlike the previous 'v*' pattern).
      - '*'

jobs:

  build-and-release:
    runs-on: [ubuntu-latest]
    name: Build .deb and create GitHub release
    outputs:
      deb_name: ${{ steps.build.outputs.deb_name }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v7

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Run flake8
        run: flake8

      - name: Verify tag matches pyproject.toml version
        run: |
          pkg_version="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$GITHUB_REF_NAME" != "$pkg_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${pkg_version}"
            exit 1
          fi

      - name: Build .deb package
        id: build
        run: |
          packaging/build-deb.sh
          deb_name="$(basename send-to-influx_*.deb)"
          echo "deb_name=${deb_name}" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: send-to-influx-deb
          path: send-to-influx_*.deb

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A release for this tag may already exist - e.g. GitHub's "Draft a new
          # release" UI creates the tag and the release together when you publish,
          # so by the time this runs (triggered by that same tag push) the release
          # is already there. Try creating first; if that fails for any reason
          # (already exists, including the race where it's created in the window
          # between a separate check and this create), fall back to uploading the
          # .deb to whatever release now exists for this tag instead of failing.
          if ! gh release create "$GITHUB_REF_NAME" send-to-influx_*.deb --title "$GITHUB_REF_NAME" --generate-notes; then
            gh release upload "$GITHUB_REF_NAME" send-to-influx_*.deb --clobber
          fi

  check_apt_secret:
    # `secrets` isn't a recognized named-value in a job-level `if:` (only within step
    # run/env/with), so whether to run apt-repo has to be computed in a step here and
    # passed to it via a job output instead of referencing secrets.* directly below.
    # Job id uses underscores, not hyphens: a hyphenated id referenced via dot-notation
    # in an expression (needs.some-id.outputs.x) gets parsed as subtraction, not a
    # property path.
    runs-on: [ubuntu-latest]
    name: Check whether the APT signing key is configured
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - name: Check APT_GPG_PRIVATE_KEY secret
        id: check
        run: echo "has_secret=${{ secrets.APT_GPG_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"

  apt-repo:
    # Publishes the .deb to a flat APT repo on the gh-pages branch, served via GitHub Pages.
    # Requires a one-time setup: generate a GPG key, add its private key (base64-encoded,
    # armored) as the APT_GPG_PRIVATE_KEY secret, and publish the public key for users to
    # import - see the README's "Running as a systemd service" / APT repo section. Skipped
    # until that secret exists, so tagging a release doesn't require the APT repo to be set up.
    needs: [build-and-release, check_apt_secret]
    if: needs.check_apt_secret.outputs.has_secret == 'true'
    runs-on: [ubuntu-latest]
    name: Publish APT repo to GitHub Pages
    env:
      KEEP_LAST_N: 5
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: send-to-influx-deb
          path: new-deb

      - name: Check out gh-pages branch
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Install apt repo tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gnupg

      - name: Import GPG signing key
        run: echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Update repo contents
        working-directory: gh-pages
        run: |
          cp ../new-deb/*.deb .

          # Keep only the most recent N .deb files; full history stays in GitHub Releases.
          ls -t *.deb | tail -n +$((KEEP_LAST_N + 1)) | xargs -r rm --

          dpkg-scanpackages . /dev/null > Packages
          gzip -9c Packages > Packages.gz

          apt-ftparchive release . > Release
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clear-sign -o InRelease Release
          gpg --batch --yes --armor --export > send-to-influx.gpg

      - name: Commit and push
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish ${GITHUB_REF_NAME} to APT repo" || echo "Nothing to commit"
          git push origin gh-pages
