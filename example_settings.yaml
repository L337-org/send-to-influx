# Settings for the HueToInflux script

# Refuse to start if settings.yaml is readable by group/other AND actually contains a
# real credential (not just placeholder/systemd-creds-sentinel text). New installs
# default this to true; upgraded installs that predate this key default to false
# (warning-only) until you opt in - see SECURITY.md.
enforce_permissions: true

# The sources to be kicked off by the wrapper script
sources:
  - "hue"
  - "speedtest"
  - "openmeteo"
  - "carbonintensity"
  # - "zappi"
  # - "harvi"
  # - "eddi"
  # - "octopus"
  # - "nuki"

# Optional stagger delay (seconds) between source starts
# This avoids collectors with equal intervals running at exactly the same time
stagger_seconds: 10

# Optional log file path; if omitted, logs go to stdout only.
# The file is rotated automatically once it reaches log_max_bytes.
# If running under the packaged systemd service, only /etc/send-to-influx/ is writable by
# default (e.g. "/etc/send-to-influx/send-to-influx.log") - see the README's "Running as a
# systemd service" section before pointing this at /var/log or anywhere else.
# logfile: "/var/log/send-to-influx.log"
# log_max_bytes: 10485760
# log_backup_count: 3

# Optional log level (DEBUG/INFO/WARNING/ERROR/CRITICAL); defaults to INFO.
# Overridden by the -v/--verbose command line flag.
# loglevel: "INFO"

# The default source to use if no source is specified on the command line
default_source: "hue"

# InfluxDB settings
influx:
  url: "https://influx.example.com:8086"
  # For InfluxDB v1, use user/password and per-source db:
  user: "your_influx_user"
  password: "your_influx_password"
  # For InfluxDB v2, use token/org instead and per-source bucket: instead of db. Leave
  # both blank (as shipped) for v1 - an empty token is falsy, so it's correctly
  # ignored rather than mistaken for real v2 config. token/org are shipped here as
  # real, empty keys rather than commented out specifically so the packaged
  # install's debconf flow (send-to-influx-set-credential --set-field/the dedicated
  # credential subcommand) can write into them directly - a commented-out line
  # isn't a YAML key at all, so those tools have nothing to rewrite.
  token: ""
  org: ""
  timeout: 5
  # Uncomment the line below to skip TLS certificate verification (e.g. self-signed/internal certs)
  # insecure: true

# Shared MQTT broker settings, used by every MQTT-based source (currently: nuki).
# Like the influx block above, this is per-install infrastructure rather than
# per-source config - one broker *configuration* shared by all MQTT sources (each collector
# connects briefly per collection cycle rather than holding a persistent connection). See the
# README's "Nuki Smart Lock (MQTT)" section for first-time Mosquitto setup.
mqtt:
  # The hostname or IP address of the MQTT broker
  broker_host: "mqtt.example.com"
  # The broker port (1883 is the MQTT standard; Nuki devices only ever connect to 1883)
  broker_port: 1883
  # send-to-influx's OWN broker credential. If your broker requires authentication,
  # use a separate login from the one the device itself publishes with (e.g. the
  # account entered in the Nuki app), so either can be rotated or revoked
  # independently. Leave both blank for anonymous access, if your broker allows it.
  # (Shipped as real, empty keys - like influx.token/org above - so the packaged
  # install's debconf flow has YAML keys to write into.)
  username: ""
  password: ""

# Optional remote MCP server - lets Claude Desktop/Mobile query collected device
# data over an OAuth-protected Streamable-HTTP endpoint. Disabled unless BOTH
# user and password are set (there is no separate enabled flag). The server only
# ever binds a private interface and speaks plain HTTP: TLS termination is your
# reverse proxy's job, and public_url is the external https:// address it serves
# (required when enabled - OAuth discovery metadata must advertise it).
mcp:
  # Force the server off regardless of user/password state below - a kill switch
  # independent of credentials, for when the password lives in systemd-creds and
  # blanking user/password here alone wouldn't reach a coherent disabled state.
  # Also handy for isolating the MCP server during troubleshooting. Leave false/
  # absent for normal use (credentials-present is the primary enablement mechanism).
  disabled: false
  # Any-interface (0.0.0.0/::) and public IPs are refused outright - see the README's MCP section.
  bind_address: "127.0.0.1:8420"
  # e.g. "https://mcp.example.org" - the reverse-proxied address Claude connects to
  public_url: ""
  # Resource-owner login for the OAuth authorise page. Leave both blank to keep the
  # MCP server disabled. (Real, empty keys - like influx.token/org above - so the
  # packaged install's debconf flow has YAML keys to write into. password can be
  # stored via 'send-to-influx-set-credential mcp-password' on the packaged install.)
  user: ""
  password: ""
  # Where OAuth client registrations/refresh tokens persist across restarts.
  # Defaults to mcp-oauth-state.json next to this settings file.
  # state_file: "/etc/send-to-influx/mcp-oauth-state.json"

# Hue bridge settings
hue:
  # The database to use
  db: "hue_db"
  # Opt in to letting the MCP server control Hue lights/plugs (on/off, brightness,
  # colour temperature and colour) via the hue_set_light tool. Off by default - the
  # MCP server is read-only unless you set this true. Has no effect unless the MCP
  # server is enabled (see the mcp block above).
  mcp_read_write: false
  # The hostname or IP address of the Hue bridge
  host: "hue.example.com"
  # Hue bridge username.  See https://developers.meethue.com/develop/get-started-2/
  #   for instructions on how to generate this
  user: "your_hue_user"
  # Timeout for requests to the Hue bridge
  timeout: 5
  # Interval in seconds between data collection
  interval: 300
  # Temperature unit (C/F/K)
  temperature_units: "C"
  # Skip TLS certificate verification. Defaults to true since Hue bridges are commonly
  # reached over a self-signed local certificate. Set to false if yours has a valid cert.
  insecure: true
  # Optional name mappings for custom naming
  # If not specified, the name in the Hue settings is used
  # Any spaces will be replaced with underscores
  sensors:
    "Hue ambient light sensor 1": "Room1_Light_Sensor"
    "Hue ambient light sensor 2": "Room2_Light_Sensor"
    "Hue temperature sensor 1": "Room1_Temperature_Sensor"
    "Hue temperature sensor 2": "Room2_Temperature_Sensor"

# Speedtest settings
speedtest:
  # The database to use
  db: "speedtest_db"
  # Opt in to letting the MCP server trigger a speed test on demand (the
  # speedtest_run tool). Runs on this host only. Off by default. Has no effect
  # unless the MCP server is enabled (see the mcp block above).
  mcp_read_write: false
  # Interval in seconds between data collection
  interval: 21600
  # Timeout for the speedtest scan
  timeout: 5
  # The fields to collect from the Speedtest results
  
  fields:
    - "download"
    - "upload"
    - "ping"

# Open-Meteo weather settings (no API key required)
openmeteo:
  # The database to use
  db: "weather_db"
  # Interval in seconds between data collection (15 minutes minimum recommended)
  interval: 900
  # Latitude and longitude for the weather location
  latitude: 51.5
  longitude: -2.6
  # Timeout for requests to the Open-Meteo API
  timeout: 10
  # Fields to collect from the current weather response
  # See https://open-meteo.com/en/docs for a full list of available variables
  fields:
    - "temperature_2m"
    - "relative_humidity_2m"
    - "precipitation"
    - "cloud_cover"
    - "wind_speed_10m"
    - "direct_radiation"

# National Grid Carbon Intensity settings (no API key required)
carbonintensity:
  # The database to use
  db: "grid_db"
  # Interval in seconds between data collection (half-hourly data, 1800 minimum)
  interval: 1800
  # Timeout for requests to the Carbon Intensity API
  timeout: 10
  # Set to true to also collect the national generation fuel mix percentages
  # (gas, nuclear, wind, solar, coal, hydro, biomass, imports, other)
  include_generation: true

# General Myenergi settings
myenergi:
  # The URL to get the status of the Eddi device
  eddi_url: "https://s18.myenergi.net/cgi-jstatus-E"
  # The URL to get the status of the Zappi device
  zappi_url: "https://s18.myenergi.net/cgi-jstatus-Z"
  # The URL to get the status of the Harvi device
  harvi_url: "https://s18.myenergi.net/cgi-jstatus-H"
  # The URL to get the status of all devices
  status_url: "https://s18.myenergi.net/cgi-jstatus-*"
  # The URL to get the dayhour data for the Zappi device
  dayhour_url: "https://s18.myenergi.net/cgi-jdayhour-Z"
  # The API key for the Myenergi API
  apikey: "your_api_key"
  # Timeout for requests to the Myenergi API
  timeout: 5

# Zappi settings
zappi:
  # The database to use
  db: "zappi_db"
  # Interval in seconds between data collection
  interval: 300
  # The serial number of the Zappi device
  serial: "your_zappi_serial"
  # The fields to collect from the Zappi device
  fields:
    - "frq"
    - "vol"
    - "gen"
    - "grd"
    - "che"
    - "sta"
    - "wifiLink"
    - "ethernetLink"
    - "newAppAvailable"
    - "newBootloaderAvailable"

# Harvi settings (CT clamp energy monitor)
harvi:
  # The database to use
  db: "myenergi_db"
  # Interval in seconds between data collection
  interval: 300
  # The serial number of the Harvi device (used for API authentication)
  serial: "your_harvi_serial"
  # The fields to collect from the Harvi device
  fields:
    - "ectp1"
    - "ectp2"
    - "ectp3"
    - "ectt1"
    - "ectt2"
    - "ectt3"

# Eddi settings (hot water diverter)
eddi:
  # The database to use
  db: "myenergi_db"
  # Interval in seconds between data collection
  interval: 300
  # The serial number of the Eddi device (used for API authentication)
  serial: "your_eddi_serial"
  # The fields to collect from the Eddi device
  fields:
    - "frq"
    - "vol"
    - "div"
    - "sta"
    - "hno"
    - "che"
    - "tp1"
    - "tp2"

# Octopus Energy settings
octopus:
  # The database to use
  db: "octopus_db"
  # Interval in seconds between data collection (half-hourly data, 1800 minimum)
  interval: 1800
  # Your Octopus Energy API key (from https://octopus.energy/dashboard/developer/)
  api_key: "your_octopus_api_key"
  # Your electricity meter MPAN (13-digit number, found on your bill)
  mpan: "your_mpan"
  # Your electricity meter serial number (found on your bill or smart meter)
  meter_serial: "your_meter_serial"
  # Your gas meter MPRN (gas meter point reference number, found on your bill)
  gas_mprn: "your_gas_mprn"
  # Your gas meter serial number (found on your bill or smart meter)
  gas_meter_serial: "your_gas_meter_serial"
  # Timeout for requests to the Octopus Energy API
  timeout: 10
  # Optional: product and tariff codes to also collect the current unit rate
  # Useful for time-of-use tariffs such as Agile Octopus
  # product_code: "AGILE-FLEX-22-11-25"
  # tariff_code: "E-1R-AGILE-FLEX-22-11-25-C"

# Nuki smart lock settings (lock + door sensor state, via the shared MQTT broker above)
nuki:
  # The database to use
  db: "nuki_db"
  # How many seconds to wait for retained MQTT messages after subscribing - this is a
  # collection window, not an HTTP request timeout. Nuki devices publish every state
  # topic with the retain flag set, so the broker delivers the full last-known state
  # of every provisioned lock immediately on subscribing; a few seconds is plenty.
  timeout: 3
  # Interval in seconds between data collection
  interval: 300
  # No per-lock configuration is needed: every lock provisioned to the broker
  # publishes under its own topic namespace and is reported automatically, with
  # fields prefixed by the lock's own name from the Nuki app - give each lock a
  # distinct name there to keep the fields apart.
