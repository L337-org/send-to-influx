# Settings for the HueToInflux script

# The sources to be kicked off by the wrapper script
sources:
  - "hue"
  - "speedtest"
  - "openmeteo"
  - "carbonintensity"
  # - "zappi"
  # - "harvi"
  # - "eddi"
  # - "octopus"

# Optional stagger delay (seconds) between source starts
# This avoids collectors with equal intervals running at exactly the same time
stagger_seconds: 10

# Optional log file path; if omitted, logs go to stdout only.
# The file is rotated automatically once it reaches log_max_bytes.
# logfile: "/var/log/send-to-influx.log"
# log_max_bytes: 10485760
# log_backup_count: 3

# Optional log level (DEBUG/INFO/WARNING/ERROR/CRITICAL); defaults to INFO.
# Overridden by the -v/--verbose command line flag.
# loglevel: "INFO"

# The default source to use if no source is specified on the command line
default_source: "hue"

# InfluxDB settings
# `user`/`password` (v1) or `token` (v2) below may instead be supplied via the
# INFLUX_PASSWORD / INFLUX_TOKEN environment variables, which take precedence
# over the values here if set - useful for keeping secrets out of this file.
# For InfluxDB v1, use user/password and per-source db:
influx:
  url: "https://influx.example.com:8086"
  user: "your_influx_user"
  password: "your_influx_password"
  timeout: 5
  # Uncomment the line below to skip TLS certificate verification (e.g. self-signed/internal certs)
  # insecure: true

# For InfluxDB v2, use token/org instead and per-source bucket: instead of db:
# influx:
#   url: "https://influx.example.com:8086"
#   token: "your_influx_token"
#   org: "your_org"
#   timeout: 5
#   insecure: false

# Hue bridge settings
hue:
  # The database to use
  db: "hue_db"
  # The hostname or IP address of the Hue bridge
  host: "hue.example.com"
  # Hue bridge username.  See https://developers.meethue.com/develop/get-started-2/
  #   for instructions on how to generate this
  user: "your_hue_user"
  # Timeout for requests to the Hue bridge
  timeout: 5
  # Interval in seconds between data collection
  interval: 300
  # Temperature unit (C/F/K)
  temperature_units: "C"
  # Skip TLS certificate verification. Defaults to true since Hue bridges are commonly
  # reached over a self-signed local certificate. Set to false if yours has a valid cert.
  insecure: true
  # Optional name mappings for custom naming
  # If not specified, the name in the Hue settings is used
  # Any spaces will be replaced with underscores
  sensors:
    "Hue ambient light sensor 1": "Room1_Light_Sensor"
    "Hue ambient light sensor 2": "Room2_Light_Sensor"
    "Hue temperature sensor 1": "Room1_Temperature_Sensor"
    "Hue temperature sensor 2": "Room2_Temperature_Sensor"

# Speedtest settings
speedtest:
  # The database to use
  db: "speedtest_db"
  # Interval in seconds between data collection
  interval: 21600
  # Timeout for the speedtest scan
  timeout: 5
  # The fields to collect from the Speedtest results
  
  fields:
    - "download"
    - "upload"
    - "ping"

# Open-Meteo weather settings (no API key required)
openmeteo:
  # The database to use
  db: "weather_db"
  # Interval in seconds between data collection (15 minutes minimum recommended)
  interval: 900
  # Latitude and longitude for the weather location
  latitude: 51.5
  longitude: -2.6
  # Timeout for requests to the Open-Meteo API
  timeout: 10
  # Fields to collect from the current weather response
  # See https://open-meteo.com/en/docs for a full list of available variables
  fields:
    - "temperature_2m"
    - "relative_humidity_2m"
    - "precipitation"
    - "cloud_cover"
    - "wind_speed_10m"
    - "direct_radiation"

# National Grid Carbon Intensity settings (no API key required)
carbonintensity:
  # The database to use
  db: "grid_db"
  # Interval in seconds between data collection (half-hourly data, 1800 minimum)
  interval: 1800
  # Timeout for requests to the Carbon Intensity API
  timeout: 10
  # Set to true to also collect the national generation fuel mix percentages
  # (gas, nuclear, wind, solar, coal, hydro, biomass, imports, other)
  include_generation: true

# General Myenergi settings
myenergi:
  # The URL to get the status of the Eddi device
  eddi_url: "https://s18.myenergi.net/cgi-jstatus-E"
  # The URL to get the status of the Zappi device
  zappi_url: "https://s18.myenergi.net/cgi-jstatus-Z"
  # The URL to get the status of the Harvi device
  harvi_url: "https://s18.myenergi.net/cgi-jstatus-H"
  # The URL to get the status of all devices
  status_url: "https://s18.myenergi.net/cgi-jstatus-*"
  # The URL to get the dayhour data for the Zappi device
  dayhour_url: "https://s18.myenergi.net/cgi-jdayhour-Z"
  # The API key for the Myenergi API
  apikey: "your_api_key"
  # Timeout for requests to the Myenergi API
  timeout: 5

# Zappi settings
zappi:
  # The database to use
  db: "zappi_db"
  # Interval in seconds between data collection
  interval: 300
  # The serial number of the Zappi device
  serial: "your_zappi_serial"
  # The fields to collect from the Zappi device
  fields:
    - "frq"
    - "vol"
    - "gen"
    - "grd"
    - "che"
    - "sta"
    - "wifiLink"
    - "ethernetLink"
    - "newAppAvailable"
    - "newBootloaderAvailable"

# Harvi settings (CT clamp energy monitor)
harvi:
  # The database to use
  db: "myenergi_db"
  # Interval in seconds between data collection
  interval: 300
  # The serial number of the Harvi device (used for API authentication)
  serial: "your_harvi_serial"
  # The fields to collect from the Harvi device
  fields:
    - "ectp1"
    - "ectp2"
    - "ectp3"
    - "ectt1"
    - "ectt2"
    - "ectt3"

# Eddi settings (hot water diverter)
eddi:
  # The database to use
  db: "myenergi_db"
  # Interval in seconds between data collection
  interval: 300
  # The serial number of the Eddi device (used for API authentication)
  serial: "your_eddi_serial"
  # The fields to collect from the Eddi device
  fields:
    - "frq"
    - "vol"
    - "div"
    - "sta"
    - "hno"
    - "che"
    - "tp1"
    - "tp2"

# Octopus Energy settings
octopus:
  # The database to use
  db: "octopus_db"
  # Interval in seconds between data collection (half-hourly data, 1800 minimum)
  interval: 1800
  # Your Octopus Energy API key (from https://octopus.energy/dashboard/developer/)
  api_key: "your_octopus_api_key"
  # Your electricity meter MPAN (13-digit number, found on your bill)
  mpan: "your_mpan"
  # Your electricity meter serial number (found on your bill or smart meter)
  meter_serial: "your_meter_serial"
  # Your gas meter MPRN (gas meter point reference number, found on your bill)
  gas_mprn: "your_gas_mprn"
  # Your gas meter serial number (found on your bill or smart meter)
  gas_meter_serial: "your_gas_meter_serial"
  # Timeout for requests to the Octopus Energy API
  timeout: 10
  # Optional: product and tariff codes to also collect the current unit rate
  # Useful for time-of-use tariffs such as Agile Octopus
  # product_code: "AGILE-FLEX-22-11-25"
  # tariff_code: "E-1R-AGILE-FLEX-22-11-25-C"
